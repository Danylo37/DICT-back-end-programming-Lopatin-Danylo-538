<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Search service</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
            color: #333;
        }

        h2 {
            color: #4a4a8a;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #4a4a8a;
        }

        input[type="submit"] {
            padding: 8px 18px;
            background-color: #4a4a8a;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        input[type="submit"]:hover {
            background-color: #35356e;
        }

        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .error {
            color: #c0392b;
            background: #fdecea;
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .result-item {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 14px 18px;
            margin-bottom: 14px;
        }

        .result-item h3 {
            margin: 0 0 6px 0;
            font-size: 17px;
        }

        .result-item h3 a {
            color: #1a0dab;
            text-decoration: none;
        }

        .result-item h3 a:hover {
            text-decoration: underline;
        }

        .result-item p {
            margin: 0;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h2>Search service</h2>

<form method="GET">
    <label>Search:</label>
    <input type="text" name="search" value="{{ request.args.get('search', '') }}">
    <input type="submit" value="Submit">
</form>

<hr>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

{% for item in items %}
    <div class="result-item">
        <h3><a href="{{ item.link }}">{{ item.title }}</a></h3>
        <p>{{ item.snippet }}</p>
    </div>
{% endfor %}

</body>
</html>
